<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ada Ad Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Literata';
      src: url('../fonts/Literata-Variable.ttf') format('truetype');
      font-weight: 200 900;
      font-style: normal;
    }

    :root {
      --color-bg: #FDFCFA;
      --color-surface: #FFFFFF;
      --color-surface-elevated: #F5F4F2;
      --color-text: #2D2D2D;
      --color-text-muted: #78716C;
      --color-text-faint: #A8A29E;
      --color-border: #E7E5E4;
      --color-border-strong: #D6D3D1;
      --color-accent: #B45309;
      --color-accent-hover: #92400E;
      --color-accent-light: #FEF3C7;
      --color-success: #059669;
      --color-error: #DC2626;

      --font-ui: 'Inter', -apple-system, system-ui, sans-serif;
      --font-content: 'Literata', Georgia, serif;

      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-ui);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
    }

    /* Navigation */
    .brand-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(253, 252, 250, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--color-border);
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-nav-logo {
      font-family: var(--font-content);
      font-size: 1.25rem;
      font-weight: 600;
      font-style: italic;
      color: var(--color-text);
      text-decoration: none;
    }

    .brand-nav-links {
      display: flex;
      gap: var(--spacing-lg);
    }

    .brand-nav-links a {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--color-text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .brand-nav-links a:hover {
      color: var(--color-text);
    }

    /* Slide Container */
    .slide {
      min-height: 100vh;
      padding: 60px var(--spacing-xl) 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .slide-content {
      max-width: 1100px;
      width: 100%;
    }

    .slide-number {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--color-text-faint);
      letter-spacing: 0.1em;
      margin-bottom: var(--spacing-sm);
    }

    .slide-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: var(--spacing-sm);
      line-height: 1.1;
    }

    .slide-subtitle {
      font-size: 1rem;
      color: var(--color-text-muted);
      max-width: 600px;
      margin-bottom: var(--spacing-md);
    }

    /* Cover Slide */
    .slide-cover {
      background: linear-gradient(180deg, var(--color-bg) 0%, var(--color-surface) 100%);
      text-align: center;
      justify-content: center;
      align-items: center;
    }

    .slide-cover .brand-logo {
      font-family: var(--font-content);
      font-size: 8rem;
      font-weight: 600;
      font-style: italic;
      letter-spacing: -0.03em;
      margin-bottom: var(--spacing-lg);
      color: var(--color-text);
    }

    .slide-cover .brand-tagline {
      font-size: 1.5rem;
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-lg);
    }

    .slide-cover .brand-version {
      font-size: 0.85rem;
      color: var(--color-text-faint);
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--color-surface-elevated);
      border-radius: 100px;
      display: inline-block;
    }

    /* Color Swatches */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .color-swatch {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .color-swatch-preview {
      height: 40px;
    }

    .color-swatch-info {
      padding: var(--spacing-sm);
    }

    .color-swatch-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: var(--spacing-xs);
    }

    .color-swatch-value {
      font-family: monospace;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .color-swatch-usage {
      font-size: 0.75rem;
      color: var(--color-text-faint);
      margin-top: var(--spacing-xs);
    }

    /* Color Sections */
    .color-section {
      margin-bottom: var(--spacing-lg);
    }

    .color-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-sm);
    }

    /* Typography Specimens */
    .type-specimen {
      margin-bottom: var(--spacing-sm);
      padding: var(--spacing-md);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }

    .type-specimen-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-accent);
      background: var(--color-accent-light);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: 100px;
      display: inline-block;
      margin-bottom: var(--spacing-md);
    }

    .type-specimen-sample {
      font-size: 1.5rem;
      line-height: 1.2;
      margin-bottom: var(--spacing-xs);
    }

    .type-specimen-sample.serif {
      font-family: var(--font-content);
    }

    .type-specimen-sample.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 1.5rem;
    }

    .type-specimen-meta {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .type-specimen-meta code {
      background: var(--color-surface-elevated);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-family: monospace;
      font-size: 0.8rem;
    }

    /* Type Scale */
    .type-scale {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .type-scale-item {
      display: grid;
      grid-template-columns: 100px 1fr;
      align-items: baseline;
      gap: var(--spacing-md);
      padding-bottom: var(--spacing-sm);
      border-bottom: 1px solid var(--color-border);
    }

    .type-scale-item:last-child {
      border-bottom: none;
    }

    .type-scale-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--color-text-muted);
    }

    .type-scale-label code {
      display: block;
      font-family: monospace;
      font-size: 0.7rem;
      color: var(--color-text-faint);
      margin-top: var(--spacing-xs);
    }

    /* Spacing Demo */
    .spacing-grid {
      display: flex;
      gap: var(--spacing-md);
      flex-wrap: wrap;
      margin-top: var(--spacing-md);
    }

    .spacing-item {
      text-align: center;
    }

    .spacing-box {
      background: var(--color-accent-light);
      border: 2px solid var(--color-accent);
      margin-bottom: var(--spacing-sm);
    }

    .spacing-label {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .spacing-value {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      font-family: monospace;
    }

    /* Radius Demo */
    .radius-grid {
      display: flex;
      gap: var(--spacing-lg);
      margin-top: var(--spacing-md);
    }

    .radius-item {
      text-align: center;
    }

    .radius-box {
      width: 50px;
      height: 50px;
      background: var(--color-surface);
      border: 2px solid var(--color-border-strong);
      margin-bottom: var(--spacing-sm);
    }

    .radius-label {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .radius-value {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      font-family: monospace;
    }

    /* Shadow Demo */
    .shadow-grid {
      display: flex;
      gap: var(--spacing-lg);
      margin-top: var(--spacing-md);
    }

    .shadow-item {
      text-align: center;
    }

    .shadow-box {
      width: 80px;
      height: 50px;
      background: var(--color-surface);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-md);
    }

    .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); }

    .shadow-label {
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* Icon Demo */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--spacing-md);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }

    .icon-item svg {
      margin-bottom: var(--spacing-sm);
      color: var(--color-text);
    }

    .icon-item span {
      font-size: 0.7rem;
      color: var(--color-text-muted);
    }

    .icon-specs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .icon-spec {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
    }

    .icon-spec-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-sm);
    }

    .icon-spec-value {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .icon-spec-note {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-top: var(--spacing-xs);
    }

    /* Component Demo */
    .component-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .component-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
    }

    .component-card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-md);
    }

    .component-demo {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-md);
      align-items: center;
    }

    /* Button Demos */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: 12px 24px;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--color-text);
      color: white;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background: var(--color-surface-elevated);
      border-color: var(--color-border-strong);
    }

    .btn-accent {
      background: var(--color-accent);
      color: white;
    }

    .btn-accent:hover {
      background: var(--color-accent-hover);
    }

    .btn-ghost {
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-text);
    }

    .btn-ghost:hover {
      background: var(--color-text);
      color: white;
    }

    .btn-success {
      background: #D1FAE5;
      color: var(--color-success);
      border: 1px solid var(--color-success);
    }

    .btn-success:hover {
      background: var(--color-success);
      color: white;
    }

    /* Badge Demos */
    .badge {
      display: inline-block;
      padding: var(--spacing-xs) var(--spacing-md);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 100px;
    }

    .badge-accent {
      background: var(--color-accent-light);
      color: var(--color-accent);
    }

    .badge-success {
      background: #D1FAE5;
      color: var(--color-success);
    }

    .badge-muted {
      background: var(--color-surface-elevated);
      color: var(--color-text-muted);
    }

    /* Input Demos */
    .input-demo {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .input {
      padding: 10px 14px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-text);
      transition: border-color 0.15s;
      width: 100%;
    }

    .input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px var(--color-accent-light);
    }

    .input::placeholder {
      color: var(--color-text-faint);
    }

    /* Card Demos */
    .demo-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .demo-card-title {
      font-weight: 600;
      margin-bottom: var(--spacing-xs);
    }

    .demo-card-text {
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }

    /* Voice Section */
    .voice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .voice-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
    }

    .voice-card-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
    }

    .voice-card-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .voice-card-icon.do {
      background: #D1FAE5;
      color: var(--color-success);
    }

    .voice-card-icon.dont {
      background: #FEE2E2;
      color: var(--color-error);
    }

    .voice-card-title {
      font-weight: 600;
    }

    .voice-examples {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .voice-example {
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-md);
      font-size: 0.85rem;
    }

    .voice-example.do {
      background: #F0FDF4;
      border-left: 3px solid var(--color-success);
    }

    .voice-example.dont {
      background: #FEF2F2;
      border-left: 3px solid var(--color-error);
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    /* Principles */
    .principles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .principle-card {
      padding: var(--spacing-md);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }

    .principle-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-accent);
      margin-bottom: var(--spacing-xs);
    }

    .principle-title {
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
    }

    .principle-text {
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }

    /* Key Phrases */
    .phrases-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .phrase {
      font-family: var(--font-content);
      font-size: 1rem;
      font-style: italic;
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }

    /* Highlight Colors */
    .highlight-grid {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-lg);
    }

    .highlight-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-sm);
    }

    .highlight-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .highlight-text {
      font-size: 0.85rem;
    }

    /* Footer */
    .brand-footer {
      text-align: center;
      padding: var(--spacing-xl);
      border-top: 1px solid var(--color-border);
      color: var(--color-text-muted);
      font-size: 0.85rem;
    }

    .brand-footer a {
      color: var(--color-accent);
      text-decoration: none;
    }

    /* Logo Section */
    .logo-showcase {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .logo-demo {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100px;
    }

    .logo-demo.dark {
      background: #2D2D2D;
      border-color: #2D2D2D;
    }

    .logo-demo-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-sm);
    }

    .logo-demo.dark .logo-demo-label {
      color: #A8A29E;
    }

    .logo-small {
      font-family: var(--font-content);
      font-size: 1.5rem;
      font-weight: 600;
      font-style: italic;
      letter-spacing: -0.02em;
      color: var(--color-text);
    }

    .logo-demo.dark .logo-small {
      color: #FDFCFA;
    }

    .logo-large {
      font-family: var(--font-content);
      font-size: 3rem;
      font-weight: 600;
      font-style: italic;
      letter-spacing: -0.02em;
      color: var(--color-text);
      line-height: 1;
    }

    .logo-demo.dark .logo-large {
      color: #FDFCFA;
    }

    .logo-watermark-demo {
      position: relative;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-sm);
      min-height: 80px;
      overflow: hidden;
      margin-top: var(--spacing-sm);
    }

    .logo-watermark {
      position: absolute;
      bottom: -0.15em;
      left: -0.02em;
      font-family: var(--font-content);
      font-weight: 600;
      font-style: italic;
      font-size: 20vw;
      line-height: 0.8;
      color: var(--color-text);
      opacity: 0.04;
      user-select: none;
      pointer-events: none;
    }

    .logo-watermark-content {
      position: relative;
      z-index: 1;
    }

    .logo-watermark-content h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: var(--spacing-xs);
    }

    .logo-watermark-content p {
      color: var(--color-text-muted);
      max-width: 400px;
      font-size: 0.85rem;
    }

    .logo-specs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .logo-spec {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-sm);
    }

    .logo-spec-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-xs);
    }

    .logo-spec-value {
      font-size: 1rem;
      font-weight: 600;
    }

    .logo-spec-value.serif {

    // =====================================================
    // WAVEFORM ANIMATION
    // =====================================================
    function createWaveformAnimation(canvas, scale = 1) {
      const ctx = canvas.getContext('2d');
      const particles = [];
      const particleCount = Math.floor(8 * scale);
      const permanentCount = Math.floor(2 * scale);
      let time = 0;
      let thinkingPhase = 0;
      let mode = 'speaking';

      for (let i = 0; i < particleCount + permanentCount; i++) {
        particles.push({
          angle: (i / (particleCount + permanentCount)) * Math.PI * 2,
          radius: 3 * scale,
          size: 1.2 * scale,
          state: 'orbiting',
          permanent: i >= particleCount,
          x: 0, y: 0, vx: 0, vy: 0, life: 1
        });
      }

      function draw() {
        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;
        ctx.clearRect(0, 0, w, h);

        let isSpeaking, boostedLevel;
        if (mode === 'speaking') {
          const simulatedLevel = 0.5 + Math.sin(time * 4) * 0.3 + Math.sin(time * 7) * 0.15;
          boostedLevel = Math.pow(Math.max(0, simulatedLevel), 0.5) * 1.6;
          isSpeaking = boostedLevel > 0.18;
        } else {
          isSpeaking = false;
          boostedLevel = 0;
        }

        const maxRadius = Math.min(w, h) / 2 - 2;
        const halfRadius = maxRadius * 0.35;
        let orbitRadius;
        if (isSpeaking) {
          orbitRadius = halfRadius;
        } else {
          thinkingPhase += 0.03;
          const pulse = Math.sin(thinkingPhase) * 0.5 + 0.5;
          orbitRadius = maxRadius * (0.15 + pulse * 0.2);
        }

        const spinSpeed = isSpeaking ? 0.03 + boostedLevel * 0.02 : 0.015;

        particles.forEach(p => {
          if (p.state === 'orbiting') {
            p.angle += spinSpeed;
            p.radius += (orbitRadius - p.radius) * 0.1;
            const x = centerX + Math.cos(p.angle) * p.radius;
            const y = centerY + Math.sin(p.angle) * p.radius;
            const atHorizon = Math.abs(y - centerY) < 3 * scale;
            const shouldDetach = !p.permanent && isSpeaking && atHorizon && Math.random() < boostedLevel * 0.4;

            if (shouldDetach) {
              p.state = 'flying';
              p.x = x; p.y = y;
              p.vx = (x < centerX ? -1 : 1) * (0.4 + boostedLevel * 0.4) * scale;
              p.vy = (Math.random() - 0.5) * 0.2 * scale;
              p.life = 1;
            } else {
              ctx.beginPath();
              ctx.arc(x, y, p.size + (isSpeaking ? boostedLevel * 0.3 : 0.1), 0, Math.PI * 2);
              ctx.fillStyle = `rgba(180, 83, 9, ${isSpeaking ? 0.8 : 0.5})`;
              ctx.fill();
            }
          } else if (p.state === 'flying') {
            p.x += p.vx; p.y += p.vy;
            p.vy *= 0.96; p.life -= 0.05;
            if (p.life > 0) {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size * (0.5 + p.life * 0.5), 0, Math.PI * 2);
              ctx.fillStyle = p.vx < 0 ? `rgba(220, 100, 20, ${p.life * 0.9})` : `rgba(251, 191, 36, ${p.life * 0.9})`;
              ctx.fill();
            }
            if (p.life <= 0) { p.state = 'refilling'; p.radius = 0; }
          } else if (p.state === 'refilling') {
            p.angle += spinSpeed;
            p.radius += (orbitRadius - p.radius) * 0.08;
            const x = centerX + Math.cos(p.angle) * p.radius;
            const y = centerY + Math.sin(p.angle) * p.radius;
            const fadeIn = Math.min(1, p.radius / (orbitRadius * 0.8));
            ctx.beginPath();
            ctx.arc(x, y, p.size * fadeIn, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 83, 9, ${fadeIn * (isSpeaking ? 0.8 : 0.5)})`;
            ctx.fill();
            if (p.radius > orbitRadius * 0.9) p.state = 'orbiting';
          }
        });

        time += 0.05;
        requestAnimationFrame(draw);
      }

      draw();
      return {
        setMode: (newMode) => { mode = newMode; },
        setSpeaking: () => { mode = 'speaking'; },
        setThinking: () => { mode = 'thinking'; }
      };
    }

    function parseEditorText(text) {
      const match = text.match(/\{\{(.+?)\}\}/);
      if (match) {
        return { before: text.substring(0, match.index), highlightText: match[1], after: text.substring(match.index + match[0].length) };
      }
      return { before: text, highlightText: '', after: '' };
    }

    // =====================================================

    function initializeAd(variant, adIndex, conceptIndex) {
      const prefix = `c${conceptIndex}-a${adIndex}`;
      const highlight = document.getElementById(`${prefix}-highlight`);
      const acceptBtn = document.getElementById(`${prefix}-accept`);
      const framesContainer = document.getElementById(`${prefix}-frames`);
      const demoArea = document.getElementById(`${prefix}-demo`);
      const ctaFrame = document.getElementById(`${prefix}-cta-frame`);
      const finalFrame = document.getElementById(`${prefix}-final-frame`);
      const finalText = document.getElementById(`${prefix}-final-text`);

      const FINAL_MESSAGE = 'Ada is an agentic voice-driven content editor with built-in agents that watch as you write. Discuss ideas, refine prose, or dictate replacements\u2014all with your voice.';

      const frames = {
        speaking: document.getElementById(`${prefix}-frame-speaking`),
        transcription: document.getElementById(`${prefix}-frame-transcription`),
        thinking: document.getElementById(`${prefix}-frame-thinking`),
        suggestion: document.getElementById(`${prefix}-frame-suggestion`),
        applied: document.getElementById(`${prefix}-frame-applied`)
      };

      const speakingCanvas = document.getElementById(`${prefix}-waveform`);
      const thinkingCanvas = document.getElementById(`${prefix}-waveform-thinking`);
      const speakingWaveform = createWaveformAnimation(speakingCanvas, 0.7);
      const thinkingWaveform = createWaveformAnimation(thinkingCanvas, 0.7);
      thinkingWaveform.setThinking();

      function showFrame(frameName) {
        framesContainer.classList.add('visible');
        Object.values(frames).forEach(f => f.classList.remove('active'));
        if (frames[frameName]) frames[frameName].classList.add('active');
      }

      function hideAllFrames() {
        framesContainer.classList.remove('visible');
        Object.values(frames).forEach(f => f.classList.remove('active'));
      }

      function resetAll() {
        ctaFrame.classList.remove('visible');
        finalFrame.classList.remove('visible', 'fade-out');
        finalText.innerHTML = '';
        demoArea.style.opacity = '1';
        hideAllFrames();
        highlight.classList.remove('active', 'accepted');
        highlight.textContent = parseEditorText(variant.editorText).highlightText;
        highlight.style.display = '';
        acceptBtn.classList.remove('clicked');
      }

      let stopped = false;

      async function runAd() {
        stopped = false;
        const parsed = parseEditorText(variant.editorText);
        resetAll();

        // Beat-quantized animation (81 BPM grid)
        const wait = ms => new Promise((resolve, reject) => {
          const id = setTimeout(resolve, ms);
          const check = setInterval(() => {
            if (stopped) { clearTimeout(id); clearInterval(check); reject('stopped'); }
          }, 100);
          setTimeout(() => clearInterval(check), ms + 50);
        });

        try {
          // --- Chapter 1: The Edit ---
          await wait(BEAT);                       // 1 beat: pause
          highlight.classList.add('active');
          await wait(BEAT * 2);                   // 2 beats: highlight visible
          showFrame('speaking');
          await wait(BEAT * 3);                   // 3 beats: waveform speaking
          showFrame('transcription');
          await wait(BEAT * 3);                   // 3 beats: transcription visible
          showFrame('thinking');
          await wait(BEAT * 3);                   // 3 beats: thinking dots
          showFrame('suggestion');
          await wait(BAR);                        // 1 bar (4 beats): suggestion shown
          acceptBtn.classList.add('clicked');
          await wait(HALF_BEAT);                  // ½ beat: accept click
          showFrame('applied');
          highlight.classList.remove('active');
          highlight.classList.add('accepted');
          if (variant.suggestion !== '(deleted)' && variant.suggestion !== '(delete)') {
            highlight.textContent = variant.suggestion;
          } else {
            highlight.style.display = 'none';
          }
          await wait(BAR);                        // 1 bar (4 beats): applied state

          // --- Chapter 2: Variant CTA ---
          demoArea.style.opacity = '0';
          ctaFrame.classList.add('visible');
          await wait(BAR * 3);                    // 3 bars (12 beats): variant CTA

          // Done
          highlight.style.display = '';
        } catch (e) {
          // Stopped — reset to initial state
          resetAll();
        }
      }

      function stopAd() {
        stopped = true;
      }

      // Store control functions on the toggle button
      const phoneEl = document.querySelector(`[data-phone-key="${prefix}"]`);
      if (phoneEl) {
        phoneEl._adRun = runAd;
        phoneEl._adStop = stopAd;
      }
    }

    // Group agent ad variants by agent name into concepts
    const agentAdConcepts = [];

    agentMap.forEach((concept, name) => {
      if (agentMeta[name]) {
        concept.description = agentMeta[name].description;
        concept.insight = agentMeta[name].insight;

      agentAdConcepts.push(concept);

    // =====================================================
    // AGENT AD HTML GENERATOR
    // =====================================================

                      <div class="agent-card-suggestion" id="${prefix}-suggestion">

                      <div class="agent-card-actions" id="${prefix}-actions">

    function createAgentConceptHTML(concept, conceptIndex) {
      const globalIndex = adConcepts.length + conceptIndex;
      return `
        <div class="concept-card" data-agent-concept="${conceptIndex}">
          <div class="concept-header">
            <div>
              <div class="concept-number">Concept ${globalIndex + 1}</div>
              <div class="concept-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${concept.agentColor};margin-right:6px;vertical-align:middle;"></span>${concept.name}</div>
              <div class="concept-insight">${concept.insight}</div>
            </div>
            <div class="concept-toggle">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div class="concept-ads">
            <div class="ads-wrap" id="agent-concept-${conceptIndex}-ads"></div>
          </div>
        </div>
      `;
    }

    // Render agent concepts
    const agentConceptsGrid = document.getElementById('agent-concepts-grid');
    agentConceptsGrid.innerHTML = agentAdConcepts.map((c, i) => createAgentConceptHTML(c, i)).join('');

    // Track initialized agent ads
    const initializedAgentConcepts = new Set();

    // Handle agent concept expansion
    document.querySelectorAll('#agent-concepts-grid .concept-card').forEach(card => {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.concept-ads')) return;

        const conceptIndex = parseInt(this.dataset.agentConcept);
        const isExpanded = this.classList.contains('expanded');

        // Collapse all others in this section
        document.querySelectorAll('#agent-concepts-grid .concept-card.expanded').forEach(c => {
          if (c !== this) c.classList.remove('expanded');
        });

        this.classList.toggle('expanded');

        if (!isExpanded && !initializedAgentConcepts.has(conceptIndex)) {
          const concept = agentAdConcepts[conceptIndex];
          const adsContainer = document.getElementById(`agent-concept-${conceptIndex}-ads`);
          adsContainer.innerHTML = concept.variants.map((v, i) => createAgentAdHTML(v, i, conceptIndex)).join('');

          concept.variants.forEach((variant, vIndex) => {
            initializeAgentAd(variant, vIndex, conceptIndex);
          });

          initializedAgentConcepts.add(conceptIndex);
        }
      });
    });

    // =====================================================
    // AGENT AD ANIMATION CONTROLLER
    // =====================================================
    function agentTypeText(element, text, speed) {
      return new Promise(resolve => {
        let i = 0;
        element.innerHTML = '<span class="typing-cursor"></span>';
        function type() {
          if (i < text.length) {
            element.innerHTML = text.substring(0, i + 1) + '<span class="typing-cursor"></span>';
            i++;
            setTimeout(type, speed + Math.random() * 20);
          } else {
            resolve();
          }
        }
        type();
      });
    }

    function initializeAgentAd(variant, adIndex, conceptIndex) {
      const prefix = `ag${conceptIndex}-a${adIndex}`;
      const editorText = document.getElementById(`${prefix}-editor-text`);
      const badge = document.getElementById(`${prefix}-badge`);
      const card = document.getElementById(`${prefix}-card`);
      const issueEl = document.getElementById(`${prefix}-issue`);
      const suggestionContainer = document.getElementById(`${prefix}-suggestion`);
      const suggestionText = document.getElementById(`${prefix}-suggestion-text`);
      const actionsEl = document.getElementById(`${prefix}-actions`);
      const acceptBtn = document.getElementById(`${prefix}-accept`);
      const appliedEl = document.getElementById(`${prefix}-applied`);
      const demoArea = document.getElementById(`${prefix}-demo`);
      const ctaFrame = document.getElementById(`${prefix}-cta-frame`);
      const finalFrame = document.getElementById(`${prefix}-final-frame`);
      const finalTextEl = document.getElementById(`${prefix}-final-text`);

      const FINAL_MSG = 'Ada is an agentic voice-driven content editor with built-in agents that watch as you write. Discuss ideas, refine prose, or dictate replacements\u2014all with your voice.';

      let stopped = false;

      async function runAgentAd() {
        stopped = false;
        const t = variant.timing;
        const parsed = parseEditorText(variant.editorText);
        const wait = ms => new Promise((resolve, reject) => {
          const id = setTimeout(resolve, ms);
          const check = setInterval(() => {
            if (stopped) { clearTimeout(id); clearInterval(check); reject('stopped'); }
          }, 100);
          setTimeout(() => clearInterval(check), ms + 50);
        });

        // Reset
        editorText.innerHTML = '';
        badge.classList.remove('visible', 'running');
        card.classList.remove('visible');
        suggestionContainer.classList.remove('visible');
        actionsEl.classList.remove('visible');
        appliedEl.classList.remove('visible');
        acceptBtn.classList.remove('clicked');
        ctaFrame.classList.remove('visible');
        demoArea.style.opacity = '1';

        try {
          await wait(HALF_BEAT);

          // Type the text (organic speed, not beat-quantized)
          // Typing uses short waits that also check stopped
          for (let i = 0; i < parsed.before.length; i++) {
            if (stopped) throw 'stopped';
            editorText.innerHTML = parsed.before.substring(0, i + 1) + '<span class="typing-cursor"></span>';
            await wait(t.typingSpeed + Math.random() * 20);
          }
          const beforeLength = parsed.before.length;
          let currentText = parsed.before + parsed.highlightText;
          for (let i = 0; i < parsed.highlightText.length; i++) {
            if (stopped) throw 'stopped';
            editorText.innerHTML = currentText.substring(0, beforeLength + i + 1) + '<span class="typing-cursor"></span>';
            await wait(t.typingSpeed + Math.random() * 20);
          }
          for (let i = 0; i < parsed.after.length; i++) {
            if (stopped) throw 'stopped';
            editorText.innerHTML = currentText + parsed.after.substring(0, i + 1) + '<span class="typing-cursor"></span>';
            await wait(t.typingSpeed + Math.random() * 20);
          }

          // Beat-quantized transitions from here
          await wait(BEAT);                       // 1 beat: pause after typing

          badge.classList.add('visible');
          await wait(HALF_BEAT);                  // ½ beat: badge appear
          badge.classList.add('running');
          await wait(BEAT);                       // 1 beat: badge running
          badge.classList.remove('running');

          // Highlight flagged text
          editorText.innerHTML = `${parsed.before}<span class="highlight active" id="${prefix}-highlight">${parsed.highlightText}</span>${parsed.after}`;
          await wait(BEAT);                       // 1 beat: highlight visible

          // Agent card slides in
          issueEl.textContent = variant.issue;
          suggestionText.textContent = variant.suggestion || '(delete)';
          card.classList.add('visible');
          await wait(BEAT * 3);                   // 3 beats: read issue

          // Show suggestion
          suggestionContainer.classList.add('visible');
          await wait(HALF_BEAT);                  // ½ beat: suggestion appears
          actionsEl.classList.add('visible');
          await wait(BAR);                        // 1 bar (4 beats): read suggestion

          // Accept clicked
          acceptBtn.classList.add('clicked');
          await wait(HALF_BEAT);                  // ½ beat: accept click

          // Hide actions, show applied
          actionsEl.classList.remove('visible');
          suggestionContainer.classList.remove('visible');
          appliedEl.classList.add('visible');

          // Update highlight to accepted state
          const highlight = document.getElementById(`${prefix}-highlight`);
          if (highlight) {
            highlight.classList.remove('active');
            highlight.classList.add('accepted');
            if (variant.suggestion) {
              highlight.textContent = variant.suggestion;
            } else {
              highlight.style.display = 'none';
            }
          }

          await wait(BAR);                        // 1 bar (4 beats): applied state

          // --- Chapter 2: Variant CTA ---
          demoArea.style.opacity = '0';
          ctaFrame.classList.add('visible');
          await wait(BAR * 3);                    // 3 bars (12 beats): variant CTA

          // Done
          if (highlight) highlight.style.display = '';
        } catch (e) {
          // Stopped — reset to initial state
          editorText.innerHTML = '';
          badge.classList.remove('visible', 'running');
          card.classList.remove('visible');
          suggestionContainer.classList.remove('visible');
          actionsEl.classList.remove('visible');
          appliedEl.classList.remove('visible');
          acceptBtn.classList.remove('clicked');
          ctaFrame.classList.remove('visible');
          finalFrame.classList.remove('visible', 'fade-out');
          finalTextEl.innerHTML = '';
          demoArea.style.opacity = '1';
        }
      }

      function stopAgentAd() {
        stopped = true;
      }

      // Store control functions on the toggle button
      const toggleEl = document.querySelector(`[data-phone-key="${prefix}"]`);
      if (toggleEl) {
        toggleEl._adRun = runAgentAd;
        toggleEl._adStop = stopAgentAd;
      }
    }
  </script>
